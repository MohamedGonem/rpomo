name: Dry Run Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt install -y libnotify-bin zenity

      - name: Check
        run: cargo check

      - name: Dry run publish
        run: cargo publish --dry-run
